<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Surveillance — Live Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0f14;
      --surface: #141720;
      --border:  #1f2435;
      --accent:  #00e5a0;
      --warn:    #ff6b35;
      --danger:  #e63946;
      --info:    #4fc3f7;
      --muted:   #5a6480;
      --text:    #cdd3e8;
      --mono:    'IBM Plex Mono', monospace;
      --sans:    'IBM Plex Sans', sans-serif;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      grid-template-rows: 56px 1fr;
      grid-template-columns: 1fr 360px;
      grid-template-areas: "header header" "feed sidebar";
    }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      grid-area: header;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
    }
    header .logo {
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: var(--accent);
    }
    header .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    header .stats-bar {
      display: flex; gap: 24px;
      margin-left: auto;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
    }
    header .stats-bar span b { color: var(--text); font-weight: 600; }

    /* ── Video Feed ──────────────────────────────────────────── */
    .feed-area {
      grid-area: feed;
      position: relative;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .feed-area img {
      width: 100%; height: 100%;
      object-fit: contain;
    }
    .feed-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .alert-flash {
      position: absolute;
      inset: 0;
      border: 3px solid transparent;
      transition: border-color 0.15s;
      pointer-events: none;
    }
    .alert-flash.active { border-color: var(--danger); }

    /* ── Sidebar ─────────────────────────────────────────────── */
    .sidebar {
      grid-area: sidebar;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel {
      border-bottom: 1px solid var(--border);
      padding: 16px;
    }
    .panel-title {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    /* Motion bar */
    .motion-bar-wrap {
      height: 6px; background: var(--border); border-radius: 3px; overflow: hidden;
    }
    .motion-bar {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--warn));
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    /* Metric grid */
    .metric-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .metric {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
    }
    .metric .val {
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 600;
      color: var(--accent);
      line-height: 1;
    }
    .metric .lbl {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* Object counts */
    #object-tags {
      display: flex; flex-wrap: wrap; gap: 6px;
    }
    .tag {
      font-family: var(--mono);
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 4px;
      background: var(--border);
      color: var(--info);
    }

    /* Alert log */
    .alert-log {
      flex: 1;
      overflow-y: auto;
      padding: 0 16px 16px;
    }
    .alert-item {
      display: flex;
      flex-direction: column;
      gap: 3px;
      padding: 10px 12px;
      margin-bottom: 8px;
      border-radius: 8px;
      border-left: 3px solid var(--muted);
      background: var(--bg);
      animation: slideIn 0.25s ease;
    }
    @keyframes slideIn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:none} }
    .alert-item.CRITICAL { border-color: var(--danger); }
    .alert-item.HIGH     { border-color: var(--warn); }
    .alert-item.MEDIUM   { border-color: var(--info); }
    .alert-item .atype {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
    }
    .alert-item.CRITICAL .atype { color: var(--danger); }
    .alert-item.HIGH     .atype { color: var(--warn); }
    .alert-item.MEDIUM   .atype { color: var(--info); }
    .alert-item .adesc {
      font-size: 12px;
      color: var(--text);
      line-height: 1.4;
    }
    .alert-item .ameta {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<header>
  <div class="dot"></div>
  <span class="logo">SURVEILLANCE SYS v1.0</span>
  <div class="stats-bar">
    <span>FPS <b id="hfps">—</b></span>
    <span>Persons <b id="hpersons">0</b></span>
    <span>Alerts <b id="htotal">0</b></span>
    <span>Motion <b id="hmotion">0%</b></span>
  </div>
</header>

<main class="feed-area">
  <img id="video" src="/video_feed" alt="Live Feed"/>
  <div class="alert-flash" id="flash"></div>
</main>

<aside class="sidebar">

  <div class="panel">
    <p class="panel-title">System Metrics</p>
    <div class="metric-grid">
      <div class="metric"><div class="val" id="mfps">—</div><div class="lbl">Frames/sec</div></div>
      <div class="metric"><div class="val" id="mpersons">0</div><div class="lbl">Persons</div></div>
      <div class="metric"><div class="val" id="mframe">0</div><div class="lbl">Frame #</div></div>
      <div class="metric"><div class="val" id="malerts" style="color:var(--warn)">0</div><div class="lbl">Alerts</div></div>
    </div>
  </div>

  <div class="panel">
    <p class="panel-title">Motion Level</p>
    <div class="motion-bar-wrap"><div class="motion-bar" id="motbar"></div></div>
    <p style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:6px" id="motpct">0%</p>
  </div>

  <div class="panel">
    <p class="panel-title">Detected Objects</p>
    <div id="object-tags"><span class="tag" style="color:var(--muted)">none</span></div>
  </div>

  <div class="panel" style="border-bottom:none;">
    <p class="panel-title">Alert Log</p>
  </div>
  <div class="alert-log" id="alert-log">
    <p style="font-size:12px;color:var(--muted);padding:8px 0">No alerts yet. System monitoring…</p>
  </div>

</aside>

<script>
  let totalAlerts = 0;
  const MAX_LOG = 50;

  const ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onmessage = (e) => {
    const d = JSON.parse(e.data);
    updateMetrics(d);
    if (d.active_alerts && d.active_alerts.length > 0) {
      d.active_alerts.forEach(appendAlert);
    }
  };
  ws.onerror = () => console.warn("WebSocket error – live stats unavailable");

  function updateMetrics(d) {
    const fps  = (d.fps || 0).toFixed(1);
    const pct  = Math.round((d.motion_level || 0) * 100);
    const pstr = pct + '%';

    ['hfps','mfps'].forEach(id => setText(id, fps));
    ['hpersons','mpersons'].forEach(id => setText(id, d.person_count || 0));
    setText('mframe', d.frame_number || 0);
    setText('hmotion', pstr);
    setText('motpct', pstr);
    document.getElementById('motbar').style.width = pstr;
    document.getElementById('htotal').textContent = totalAlerts;
    document.getElementById('malerts').textContent = totalAlerts;

    // Object tags
    const tags = document.getElementById('object-tags');
    const counts = d.object_counts || {};
    const entries = Object.entries(counts);
    if (entries.length === 0) {
      tags.innerHTML = '<span class="tag" style="color:var(--muted)">none</span>';
    } else {
      tags.innerHTML = entries.map(([k,v]) =>
        `<span class="tag">${k} <b style="color:var(--text)">${v}</b></span>`
      ).join('');
    }
  }

  function appendAlert(a) {
    totalAlerts++;
    document.getElementById('htotal').textContent = totalAlerts;
    document.getElementById('malerts').textContent = totalAlerts;

    // Flash border
    const flash = document.getElementById('flash');
    flash.classList.add('active');
    setTimeout(() => flash.classList.remove('active'), 600);

    // Build log item
    const log = document.getElementById('alert-log');
    const item = document.createElement('div');
    item.className = `alert-item ${a.severity}`;
    const time = new Date(a.timestamp || Date.now()).toLocaleTimeString();
    item.innerHTML = `
      <span class="atype">${a.event_type.toUpperCase()} — ${a.severity}</span>
      <span class="adesc">${a.description}</span>
      <span class="ameta">${time} · conf ${(a.confidence*100).toFixed(0)}%</span>
    `;

    // Remove placeholder
    const placeholder = log.querySelector('p');
    if (placeholder) placeholder.remove();

    log.insertBefore(item, log.firstChild);

    // Trim log
    while (log.children.length > MAX_LOG) {
      log.removeChild(log.lastChild);
    }
  }

  function setText(id, val) {
    const el = document.getElementById(id);
    if (el) el.textContent = val;
  }
</script>
</body>
</html>
